name: Build Releases

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14        # Apple Silicon runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.10,<7"

      - name: Generate icons
        run: python assets/generate_icons.py

      - name: Build .app
        run: pyinstaller build_mac.spec --clean --noconfirm

      # Run the frozen binary's diagnostic so a build missing lazily-imported
      # packages or bundled data fails here, not on a user's machine.
      - name: Smoke test frozen app
        run: dist/AutoDubber.app/Contents/MacOS/AutoDubber --selftest

      # hdiutil works headless; create-dmg drives Finder via AppleScript and
      # fails on GUI-less runners.
      - name: Create DMG
        run: hdiutil create -volname "AutoDubber" -srcfolder dist/AutoDubber.app -ov -format UDZO dist/AutoDubber-mac.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoDubber-mac
          path: dist/AutoDubber-mac.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.10,<7"

      - name: Generate icons
        run: python assets/generate_icons.py

      - name: Build .exe
        run: pyinstaller build_windows.spec --clean --noconfirm

      # The exe is a GUI-subsystem binary (no console output on CI), but the
      # exit code still reports whether every bundled dependency loads.
      - name: Smoke test frozen app
        run: |
          $p = Start-Process -FilePath "dist/AutoDubber/AutoDubber.exe" -ArgumentList "--selftest" -Wait -PassThru -NoNewWindow
          exit $p.ExitCode

      - name: Zip output
        run: Compress-Archive -Path dist/AutoDubber -DestinationPath dist/AutoDubber-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoDubber-windows
          path: dist/AutoDubber-windows.zip
          retention-days: 30

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AutoDubber-mac/AutoDubber-mac.dmg
            AutoDubber-windows/AutoDubber-windows.zip
          generate_release_notes: true
